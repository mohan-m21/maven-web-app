apiVersion: apps/v1
kind: Deployment
metadata:
  name: maven-web-app-deployment
  labels:
    app: maven-web-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: maven-web-app

  template:
    metadata:
      labels:
        app: maven-web-app

    spec:
      containers:
        - name: maven-web-container
          image: imohan21/maven-web-app:7
          ports:
            - containerPort: 7272

---
apiVersion: v1
kind: Service
metadata:
  name: maven-web-app-service

spec:
  type: LoadBalancer

  selector:
    app: maven-web-app

  ports:
    - port: 80
      targetPort: 7272
